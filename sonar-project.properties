sonar.projectKey=Nextapp
sonar.projectName=Nextapp
sonar.sourceEncoding=UTF-8

sonar.sources=app,components,convex,hooks,types,utils
sonar.tests=__tests__
sonar.test.inclusions=__tests__/**/*.test.ts

sonar.exclusions=**/node_modules/**,**/.expo/**,**/.scannerwork/**,**/dist/**,**/coverage/**,convex/_generated/**,convex/demo.ts
sonar.cpd.exclusions=convex/demo.ts,convex/_generated/**,assets/**,**/*.json
sonar.coverage.exclusions=app/**,components/**,convex/**,hooks/**,types/**,utils/apiClient.ts,utils/apiTypes.ts,utils/i18n.ts,**/*.d.ts,*.config.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
